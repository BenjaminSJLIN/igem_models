model_0_5:
  parameters:
    alpha_0: 0.001     # Basal leak expression rate (1/min)
    alpha_max: 1.0     # Maximum transcription rate (1/min)
    K_d: 1.0           # Activation constant (Arabinose concentration units)
    n: 2.0             # Hill coefficient (cooperativity)
    gamma_m: 0.1       # mRNA degradation rate (1/min, half-life ~7 min)
    beta_p: 0.5        # Translation rate (1/min)
    gamma_p: 0.05      # Protein degradation & dilution rate (1/min, half-life ~14 min)
  simulation:
    t_end: 200         # Simulation time (minutes)
    t_steps: 1000      # Number of time steps
    ara_concentrations: [0, 0.1, 0.5, 1.0, 5.0, 10.0] # Test concentrations for Arabinose

model_1_0:
  parameters:
    K_D: 1.0           # Target DNA binding affinity (nM)
    k_cat: 100.0       # Max turnover rate for ssDNA cleavage (1/min)
    K_M: 50.0          # Michaelis constant for ssDNA (nM)
    P_threshold: 50.0  # Minimum cleaved product concentration required for detection (nM)
    t_incubate: 30.0   # Incubation time for the cleavage reaction (minutes)
  simulation:
    # We use numpy logspace equivalent inputs for sweeping ranges
    target_dna_min: 0.001
    target_dna_max: 100.0
    target_dna_steps: 100
    
    ssdna_min: 0.1
    ssdna_max: 1000.0
    ssdna_steps: 100

model_2:
  parameters:
    alpha_RCR: 10.0    # ssDNA production rate
    P_s: 1.0           # Sensor Plasmid Concentration
    G: 5.0             # g2p expression level
    K_G: 2.0           # g2p saturation constant
    delta_s: 0.1       # ssDNA degradation rate
  simulation:
    t_end: 200
    t_steps: 1000

model_3:
  parameters:
    r: 0.05            # Natural replication rate (1/min)
    mu: 0.02           # Natural dilution rate (1/min)
    k_loss: 0.01       # Plasmid death rate constant
  simulation:
    t_end: 200
    t_steps: 1000
    P_s_initial: 1.0
